<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plano de Saúde | Desbrav</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-button.active {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 6px -1px rgb(79 70 229 / 0.4);
        }
        .plan-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .plan-card.selected {
            border-color: #4f46e5;
            background-color: #eef2ff;
            transform: scale(1.02);
        }
        /* Ajuste de scroll para tabelas em celular */
        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        @keyframes pulse-whatsapp {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .animate-whatsapp {
            animation: pulse-whatsapp 2s infinite;
        }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div class="min-h-screen pb-12">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 pt-8 pb-6 px-4 text-center">
            <h1 class="text-2xl md:text-4xl font-extrabold text-indigo-700 leading-tight">
                Guia do Plano de Saúde <br class="md:hidden"> 
                <span class="text-slate-800">Colaborador Desbrav</span>
            </h1>
            <p class="mt-3 text-slate-500 text-sm md:text-lg max-w-xl mx-auto px-4">
                Simule e compare as opções de saúde pensadas para você e sua família.
            </p>
        </header>

        <main class="container mx-auto px-4 mt-8 max-w-4xl">
            
            <!-- Seleção de Planos -->
            <section class="mb-10">
                <h2 class="text-lg font-bold text-slate-800 mb-4 uppercase tracking-wider text-center">1. Escolha um Plano</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button id="btn-ambulatorial" onclick="selectPlan('ambulatorial')" class="plan-card bg-white p-5 rounded-2xl border-2 border-slate-200 text-left hover:border-indigo-300">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-xl text-indigo-900">Max Ambulatorial</h3>
                            <div class="indicator w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center">
                                <div class="dot w-3 h-3 bg-indigo-600 rounded-full hidden"></div>
                            </div>
                        </div>
                        <p class="text-slate-500 text-sm mt-2">Consultas, exames e atendimentos de urgência sem internação.</p>
                    </button>

                    <button id="btn-hospitalar" onclick="selectPlan('hospitalar')" class="plan-card bg-white p-5 rounded-2xl border-2 border-slate-200 text-left hover:border-indigo-300">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-xl text-indigo-900">Max Hospitalar</h3>
                            <div class="indicator w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center">
                                <div class="dot w-3 h-3 bg-indigo-600 rounded-full hidden"></div>
                            </div>
                        </div>
                        <p class="text-slate-500 text-sm mt-2">Cobertura completa: consultas, exames e internações/cirurgias.</p>
                    </button>
                </div>
            </section>

            <!-- Tabs Informativas -->
            <section id="info-section" class="hidden mb-10 fade-in">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="flex border-b border-slate-100 p-1 bg-slate-50">
                        <button id="tab-coberturas" onclick="showTab('coberturas')" class="tab-button flex-1 py-3 text-sm font-bold rounded-xl transition-all">COBERTURAS</button>
                        <button id="tab-carencias" onclick="showTab('carencias')" class="tab-button flex-1 py-3 text-sm font-bold rounded-xl transition-all">CARÊNCIAS</button>
                        <button id="tab-comparativo" onclick="showTab('comparativo')" class="tab-button flex-1 py-3 text-sm font-bold rounded-xl transition-all">COMPARAR</button>
                    </div>
                    <div id="tab-content" class="p-5 md:p-8 min-h-[200px]">
                        <!-- JS content -->
                    </div>
                </div>
            </section>

            <!-- Simulador -->
            <section id="simulador" class="bg-white rounded-3xl shadow-xl border border-indigo-100 p-6 md:p-10 mb-12">
                <div class="text-center mb-8">
                    <h2 class="text-2xl md:text-3xl font-black text-slate-800">Simulador de Desconto</h2>
                    <div class="h-1 w-20 bg-indigo-500 mx-auto mt-2 rounded-full"></div>
                    <p class="text-slate-500 text-sm mt-3">A Desbrav paga 50% do valor do plano Ambulatorial para você!</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Sua Faixa Etária</label>
                        <select id="employee-age" class="w-full h-14 bg-slate-50 border-2 border-slate-200 rounded-2xl px-4 text-lg font-medium focus:border-indigo-500 transition-all outline-none">
                            <!-- JS fill -->
                        </select>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-sm font-bold text-slate-700 uppercase tracking-wide">Dependentes</label>
                            <button onclick="addDependent()" class="bg-indigo-100 text-indigo-700 text-xs font-black px-4 py-2 rounded-full hover:bg-indigo-200">+ ADICIONAR</button>
                        </div>
                        <div id="dependents-list" class="space-y-3">
                            <!-- JS dynamic -->
                        </div>
                    </div>

                    <div id="simulation-results" class="pt-6 mt-6 border-t border-slate-100">
                        <!-- JS results -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const ageRanges = ["0 - 18", "19 - 23", "24 - 28", "29 - 33", "34 - 38", "39 - 43", "44 - 48", "49 - 53", "54 - 58", "59 ou mais"];
        const prices = {
            ambulatorial: [120.88, 142.32, 151.54, 165.22, 182.39, 211.48, 271.55, 299.68, 446.32, 609.95],
            hospitalar: [248.17, 299.10, 331.93, 368.49, 443.47, 511.04, 681.44, 770.09, 1321.11, 1488.94]
        };

        const planData = {
            ambulatorial: {
                name: 'Plano Max Ambulatorial',
                coverage: ['Consultas Médicas (todas)', 'Pronto Atendimento 24h', 'Exames Básicos e Especiais', 'Fisioterapia ilimitada', 'Odontologia Básica'],
                waitingPeriods: ['Consultas: Sem carência', 'Exames Básicos: Sem carência', 'Odonto: 30 dias', 'Cirurgias: 180 dias']
            },
            hospitalar: {
                name: 'Plano Max Hospitalar',
                coverage: ['TUDO DO AMBULATORIAL', 'Internações em leito privativo', 'Cirurgias Hospitalares', 'Obstetrícia / Partos'],
                waitingPeriods: ['Internações: 180 dias', 'Partos: 300 dias', 'Doenças Pré-existentes: 24 meses']
            }
        };

        let currentPlan = 'ambulatorial';
        let dependentCount = 0;

        function selectPlan(plan) {
            currentPlan = plan;
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
            document.querySelectorAll('.dot').forEach(d => d.classList.add('hidden'));
            
            const btn = document.getElementById(`btn-${plan}`);
            btn.classList.add('selected');
            btn.querySelector('.dot').classList.remove('hidden');
            
            document.getElementById('info-section').classList.remove('hidden');
            showTab('coberturas');
            calculate();
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            const content = document.getElementById('tab-content');
            if(tab === 'comparativo') {
                content.innerHTML = getComparisonTable();
            } else {
                const list = tab === 'coberturas' ? planData[currentPlan].coverage : planData[currentPlan].waitingPeriods;
                content.innerHTML = `
                    <h4 class="font-bold text-indigo-900 mb-4">${planData[currentPlan].name}</h4>
                    <ul class="space-y-3">
                        ${list.map(i => `
                            <li class="flex items-start gap-3 text-slate-600">
                                <span class="text-indigo-500 mt-1">●</span>
                                <span class="text-sm md:text-base">${i}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
            }
        }

        function getComparisonTable() {
            const rows = [
                { item: 'Consultas Médicas', amb: 'SIM', hos: 'SIM', car: 'Isento' },
                { item: 'Urgência / Emergência', amb: 'SIM', hos: 'SIM', car: 'Isento' },
                { item: 'Exames Simples', amb: 'SIM', hos: 'SIM', car: 'Isento' },
                { item: 'Fisioterapia', amb: 'SIM', hos: 'SIM', car: '90 dias' },
                { item: 'Internações', amb: 'NÃO', hos: 'SIM', car: '180 dias' },
                { item: 'Partos', amb: 'NÃO', hos: 'SIM', car: '300 dias' }
            ];

            return `
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] md:text-xs text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                <th class="pb-3 pr-2">Serviço</th>
                                <th class="pb-3 text-center">Amb.</th>
                                <th class="pb-3 text-center">Hosp.</th>
                                <th class="pb-3 text-right">Carência</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${rows.map(r => `
                                <tr class="text-sm">
                                    <td class="py-4 pr-2 font-medium text-slate-700">${r.item}</td>
                                    <td class="py-4 text-center font-bold ${r.amb === 'SIM' ? 'text-green-500' : 'text-slate-300'}">${r.amb}</td>
                                    <td class="py-4 text-center font-bold text-green-500">${r.hos}</td>
                                    <td class="py-4 text-right text-slate-500 text-xs">${r.car}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function addDependent() {
            dependentCount++;
            const list = document.getElementById('dependents-list');
            const div = document.createElement('div');
            div.className = 'flex items-center gap-2 fade-in';
            div.id = `dep-${dependentCount}`;
            div.innerHTML = `
                <select class="dep-select flex-1 h-12 bg-white border border-slate-200 rounded-xl px-3 text-sm focus:border-indigo-400 outline-none" onchange="calculate()">
                    ${ageRanges.map((range, index) => `<option value="${index}">Idade: ${range}</option>`).join('')}
                </select>
                <button onclick="removeDep(${dependentCount})" class="w-12 h-12 flex items-center justify-center text-red-400 hover:bg-red-50 rounded-xl">✕</button>
            `;
            list.appendChild(div);
            calculate();
        }

        function removeDep(id) {
            document.getElementById(`dep-${id}`).remove();
            calculate();
        }

        function calculate() {
            const empAgeIdx = document.getElementById('employee-age').value;
            const results = document.getElementById('simulation-results');
            
            const ambPrice = prices.ambulatorial[empAgeIdx];
            const subsidy = ambPrice * 0.5;
            const basePrice = prices[currentPlan][empAgeIdx];
            
            let depPrice = 0;
            document.querySelectorAll('.dep-select').forEach(s => depPrice += prices[currentPlan][s.value]);
            
            const total = (basePrice - subsidy) + depPrice;

            results.innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between items-center text-slate-600">
                        <span class="text-sm">Valor do seu plano:</span>
                        <span class="font-bold text-slate-800">${format(basePrice)}</span>
                    </div>
                    <div class="flex justify-between items-center text-green-600 bg-green-50 px-3 py-2 rounded-xl">
                        <span class="text-sm font-medium">Subsídio da Empresa:</span>
                        <span class="font-bold">-${format(subsidy)}</span>
                    </div>
                    <div class="flex justify-between items-center text-slate-600">
                        <span class="text-sm">Dependentes:</span>
                        <span class="font-bold text-slate-800">+${format(depPrice)}</span>
                    </div>
                    
                    <div class="bg-indigo-600 rounded-2xl p-5 text-white flex justify-between items-center shadow-lg mt-4">
                        <div>
                            <p class="text-[10px] opacity-80 font-bold uppercase tracking-widest">TOTAL EM FOLHA</p>
                            <p class="text-2xl md:text-3xl font-black">${format(total)}</p>
                        </div>
                        <div class="text-right">
                            <span class="bg-indigo-500 text-[10px] px-2 py-1 rounded-md font-bold">MENSAL</span>
                        </div>
                    </div>

                    <a href="https://wa.me/5551920035169?text=Olá!%20Sou%20colaborador%20da%20Desbrav%20e%20quero%20solicitar%20meu%20plano%20de%20saúde." 
                       target="_blank" 
                       class="animate-whatsapp w-full bg-green-500 hover:bg-green-600 text-white font-extrabold py-5 rounded-2xl flex items-center justify-center gap-3 mt-4 transition-all shadow-xl text-center px-4 uppercase text-sm tracking-tight leading-none">
                        <svg class="w-6 h-6 fill-current flex-shrink-0" viewBox="0 0 24 24">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                        </svg>
                        SOLICITAR MEU PLANO PARA O RH
                    </a>
                    <p class="text-slate-400 text-[10px] text-center mt-2 leading-tight uppercase tracking-tight">Fale com o RH Desbrav via WhatsApp</p>
                </div>
            `;
        }

        function format(v) {
            return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('employee-age');
            select.innerHTML = ageRanges.map((r, i) => `<option value="${i}">Sua idade: ${r}</option>`).join('');
            select.addEventListener('change', calculate);
            selectPlan('ambulatorial');
        });
    </script>
</body>
</html>
